name: Publish – Build & Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Hash-pinned: actions/checkout v4.1.7
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Hash-pinned: actions/setup-java v4.2.1
      - uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Maven dependencies
      # Hash-pinned: actions/cache v4.0.2
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        run: ./mvnw test -B

      # Hash-pinned: docker/login-action v3.1.0
      - uses: docker/login-action@e92390c5fb421da1463c202d546fed0ec5c39f20
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Hash-pinned: docker/metadata-action v5.5.1
      - uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81
        id: meta
        with:
          images: ghcr.io/bassimbenarab/kinoxp1
          tags: |
            type=sha,format=long
            type=raw,value=latest

      # Hash-pinned: docker/build-push-action v5.3.0
      - uses: docker/build-push-action@2cdde995de11925a030ce8070c3d77a52ffcf1c0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
