services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USER: kinoxp
      DB_PASSWORD: kinoxp_secret
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.3
    environment:
      MYSQL_DATABASE: kinoxp
      MYSQL_USER: kinoxp
      MYSQL_PASSWORD: kinoxp_secret
      MYSQL_ROOT_PASSWORD: root_secret
    # Port is only exposed to the internal Docker network – NOT to all host interfaces
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "kinoxp", "-pkinoxp_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
